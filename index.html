// ── Supabase REST 쿼리 헬퍼 ────────────────────────────
async function sbQuery(table, select, params = {}) {
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=${encodeURIComponent(select)}`;
  for (const [k, v] of Object.entries(params)) {
    const eqIdx = k.indexOf('=');
    if (eqIdx !== -1) {
      // "report_date=eq" → report_date=eq.value (PostgREST 필터)
      const col = k.substring(0, eqIdx);
      const op = k.substring(eqIdx + 1);
      url += `&${col}=${op}.${encodeURIComponent(v)}`;
    } else {
      // "order", "limit" 등 일반 파라미터
      url += `&${k}=${encodeURIComponent(v)}`;
    }
  }
  if (!params.limit) url += "&limit=1000";
  const r = await fetch(url, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbQueryAll(table, select, params = {}) {
  let all = [], offset = 0;
  while(true) {
    const page = await sbQuery(table, select, {...params, limit:"1000", offset:String(offset)});
    all = all.concat(page);
    if(page.length < 1000) break;
    offset += 1000;
  }
  return all;
}

async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:"POST", headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json", Prefer:"return=minimal" },
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, params) {
  let url = `${SUPABASE_URL}/rest/v1/${table}?`;
  for(const [k,v] of Object.entries(params)) url += `${k}=eq.${encodeURIComponent(v)}&`;
  const r = await fetch(url, {
    method:"DELETE", headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!r.ok) throw new Error(await r.text());
}
async function sbUpsert(table, data, onConflict) {

// 옵션명 사이즈 정렬
const SIZE_ORDER = {S:1,M:2,L:3,XL:4,XXL:5,"2XL":5,"3XL":6,FREE:7};
function sizeRank(name) {
  if(!name) return [0,"",-1,0];
  const isSet = /세트/i.test(name) ? 1 : 0;
  const clean = name.replace(/세트/g,"").trim();
  // 숫자 사이즈 + 나머지 텍스트 (예: "200블랙" → num=200, rest="블랙")
  const numMatch = clean.match(/(\d{2,3})\s*(.*)/);
  if(numMatch) { const rest=numMatch[2]||""; return [isSet, rest, -1, parseInt(numMatch[1])]; }
  // "블랙 200" 형태
  const numMatch2 = clean.match(/(.*?)\s*(\d{2,3})$/);
  if(numMatch2) { const rest=numMatch2[1]||""; return [isSet, rest, -1, parseInt(numMatch2[2])]; }
  // 문자 사이즈 (앞이든 뒤든)
  const sizeMatch = clean.match(/\b(3XL|2XL|XXL|XL|FREE|[SML])\b/i);
  if(sizeMatch) { const rank = SIZE_ORDER[sizeMatch[1].toUpperCase()]||50; return [isSet, "", rank, 0]; }
  return [isSet, name, 50, 0];
}
function sortOpts(opts) {
  return [...opts].sort((a,b) => {
    const ra = sizeRank(a.optName), rb = sizeRank(b.optName);
    // isSet → rest(색상) → sizeRank → numSize
    if(ra[0]!==rb[0]) return ra[0]-rb[0];
    if(ra[1]!==rb[1]) return ra[1]<rb[1]?-1:1;
    if(ra[2]!==rb[2]) return ra[2]-rb[2];
    return ra[3]-rb[3];
  });
}

        return `    - ${o.optName}: 재고${o.stock!=null?o.stock:"?"}개, 조회${o.views||0}, 전환율${(o.conversion_rate||0).toFixed(1)}%, 순판매${o.sales_qty||0}건, 취소${cancelAbs}건(반품률${cancelRate}%), 매출${(o.revenue||0).toLocaleString()}원, 광고비${(o.adCost||0).toLocaleString()}원${o.wingQty>0?`, 윙판매${o.wingQty}건`:""}`;
      }).join('\n');
      return `  * ${p.pName}: 총매출${p.rev?.toLocaleString()}원, 총${p.qty}건, 광고비${p.adCost?.toLocaleString()}원\n${optLines}`;
    }).join('\n');

    return `당신은 쿠팡 윙 온라인셀러의 운영 대시보드 전담 분석 어시스턴트입니다.

## 대시보드 컬럼 정의
- 판매량(sales_qty): 순판매량 (총판매 - 취소). 괄호 안 숫자는 윙 판매량
- 취소: 취소수량(절대값)과 반품률. 반품률 = 취소 / (순판매+취소) × 100. 30% 초과 시 빨간색 경고
- 조회수(views): 상품 페이지 방문 수
- 전환율(conversion_rate): 조회 대비 구매 비율 = 판매수량/조회수×100
- 매출(revenue): margin_daily 뷰 기준 매출 (쿠폰 차감 후)
- 광고비(ad_cost): 쿠팡 PA 광고 지출. 광고판매: 광고로 발생한 판매 건수
- 순이익: (마진단가 × 판매수량). 마진 = 매출 - 원가 - 수수료 - 배송비 - 쿠폰
- 재고(stock): 최신 스냅샷 기준 잔여 수량. 품절이면 0
- 7일 평균: 각 데이터 셀에 hover 시 최근 7일 추이와 평균 표시. ▼은 7일 평균 이하, ▲은 이상
- 윙 vs 로켓그로스: 동일 상품이 윙(직배송)과 로켓그로스(쿠팡물류)로 판매 가능. 옵션 행에서 병합 표시

## 메모리
save_memo로 중요한 발견/패턴/인사이트를 저장하면 다음 세션에서 자동 참고됩니다.
예: 특정 상품의 계절 패턴, 광고 효율 기준, 사용자 선호 분석 방식 등.
outdated된 메모는 delete_memo로 정리하세요.

${memos.length>0 ? "### 저장된 메모 ("+memos.length+"개)\n"+memos.map(function(m){return "[#"+m.id+"] "+m.title+" ("+(m.created_at?.slice(0,10)||"")+")\\n"+m.content;}).join("\n\n") : "저장된 메모 없음"}`;
  }

  const DB_TOOLS = [{
    name: "query_database",
    description: "Supabase DB에 REST API로 쿼리합니다. select에 필요한 컬럼, filter에 조건을 지정하세요.",
    input_schema: {
      type: "object",
      properties: {
        table: { type: "string", description: "테이블명 (예: sales_daily, ads_daily, products, inventory_snapshots, margin_daily, sales_realtime)" },
        select: { type: "string", description: "조회할 컬럼 (예: option_id,report_date,sales_qty,revenue)" },
        filter: { type: "object", description: "필터 조건 객체 (예: {\"report_date=eq\":\"2026-03-09\",\"option_id=eq\":\"12345\"})", additionalProperties: { type: "string" } },
        order: { type: "string", description: "정렬 (예: report_date.desc)" },
        limit: { type: "number", description: "결과 제한 (기본 50)" }
      },
      required: ["table","select"]
    }
  },{
    name: "save_memo",
    description: "중요한 분석 결과, 패턴, 인사이트를 메모로 저장합니다. 다음 세션에서 자동으로 참고됩니다.",
    input_schema: {
      type: "object",
      properties: {
        title: { type: "string", description: "메모 제목 (예: A01 주력상품 특성, 광고 효율 분석)" },
        content: { type: "string", description: "메모 내용 (구체적 수치, 패턴, 주의사항 등)" }
      },
      required: ["title","content"]
    }
  },{
    name: "delete_memo",
    description: "더 이상 유효하지 않은 메모를 삭제합니다.",
    input_schema: {
      type: "object",
      properties: {
        id: { type: "number", description: "삭제할 메모 ID" }
      },
      required: ["id"]
    }
  }];

  const executeTool = async (name, input) => {
    if(name==="query_database") {
      const params = { select: input.select };
      if(input.filter) Object.assign(params, input.filter);
      if(input.order) params.order = input.order;
      params.limit = String(input.limit||50);
      const rows = await sbQuery(input.table, input.select, params);
      return JSON.stringify(rows.slice(0, input.limit||50));
    }
    if(name==="save_memo") {
      await sbInsert("ai_memos",{title:input.title, content:input.content});
      const updated = await sbQuery("ai_memos","id,title,content,created_at",{order:"created_at.desc",limit:"20"});
      setMemos(updated);
      return `메모 저장 완료: "${input.title}"`;
    }
    if(name==="delete_memo") {
      await sbDelete("ai_memos",{id:input.id});
      const updated = await sbQuery("ai_memos","id,title,content,created_at",{order:"created_at.desc",limit:"20"});
      setMemos(updated);
      return `메모 #${input.id} 삭제 완료`;
    }
    return "알 수 없는 도구";
  };

  const callApi = async (apiMessages, key) => {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2048,
        system: buildSystemPrompt(context),
        tools: DB_TOOLS,
        messages: apiMessages
      })
    });
    if(!response.ok) {
      const errText = await response.text();
      throw new Error(response.status===401?"API 키를 확인해주세요":errText);
    }
    return await response.json();
  };

  const sendMessage = async () => {
    const rawKey = localStorage.getItem("ANTHROPIC_KEY") || DEFAULT_KEY;
    const key = rawKey.replace(/[^\x20-\x7E]/g,"").trim();
    if(!key) { setShowKeyInput(true); return; }
    const msg = input.trim();
    if(!msg) return;

    const newMessages = [...messages, {role:"user",content:msg}];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    try {
      let apiMessages = newMessages.filter(m=>m.role!=="error"&&m.role!=="db").map(m=>({role:m.role==="error"?"assistant":m.role,content:m.content}));
      let data = await callApi(apiMessages, key);
      let loops = 0;

      // tool use 루프: AI가 DB 조회를 요청하면 실행 후 결과 전달
      while(data.stop_reason==="tool_use" && loops<5) {
        loops++;
        const toolBlocks = data.content.filter(b=>b.type==="tool_use");
        // AI 응답 중 텍스트 부분이 있으면 표시
        const textParts = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
        if(textParts) setMessages(prev=>[...prev,{role:"assistant",content:textParts}]);

        // 도구 실행 표시
        for(const tb of toolBlocks) {
          const label = tb.name==="query_database"?`🔍 ${tb.input.table} 조회 중...`
            :tb.name==="save_memo"?`💾 메모 저장: ${tb.input.title}`
            :tb.name==="delete_memo"?`🗑 메모 #${tb.input.id} 삭제`:`⚙ ${tb.name}`;
          setMessages(prev=>[...prev,{role:"db",content:label}]);
        }

        // tool results 구성
        const toolResults = [];
        for(const tb of toolBlocks) {
          try {
            const result = await executeTool(tb.name, tb.input);
            toolResults.push({type:"tool_result",tool_use_id:tb.id,content:result});
          } catch(e) {
            toolResults.push({type:"tool_result",tool_use_id:tb.id,content:`오류: ${e.message}`,is_error:true});
          }
        }

        // 다음 API 호출: assistant 응답 + tool results
        apiMessages = [...apiMessages,
          {role:"assistant",content:data.content},
          {role:"user",content:toolResults}
        ];
        data = await callApi(apiMessages, key);
      }

      // 최종 텍스트 응답 추출
      const finalText = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
      if(finalText) setMessages(prev=>[...prev, {role:"assistant",content:finalText}]);
    } catch(e) {
      setMessages(prev=>[...prev, {role:"error",content:`오류: ${e.message}`}]);
    } finally {
      setLoading(false);
    }
  };

  const handleKeyDown = (e) => {
    if(e.key==="Enter"&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const chatStyles = {
    panel: {width:"320px",minWidth:"320px",height:"100vh",position:"sticky",top:0,
      background:C.surface,borderLeft:`1px solid ${C.border}`,display:"flex",flexDirection:"column"},
    header: {padding:"14px 16px",borderBottom:`1px solid ${C.border}`,
      fontSize:fs(11),fontWeight:700,letterSpacing:"0.15em",color:C.accent},
    msgArea: {flex:1,overflowY:"auto",padding:"12px"},
    msgUser: {background:C.accentDim,border:`1px solid ${C.accent}33`,borderRadius:"8px 8px 2px 8px",
      padding:"10px 14px",marginBottom:"8px",fontSize:fs(12),color:C.text,marginLeft:"24px"},
    msgBot: {background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:"8px 8px 8px 2px",
      padding:"10px 14px",marginBottom:"8px",fontSize:fs(12),color:C.text,marginRight:"24px",
      lineHeight:"1.6",whiteSpace:"pre-wrap"},
    msgErr: {background:C.redDim||"#2d0a14",border:`1px solid ${C.red}33`,borderRadius:"8px",
      padding:"10px 14px",marginBottom:"8px",fontSize:fs(11),color:C.red},
    inputArea: {padding:"12px",borderTop:`1px solid ${C.border}`,display:"flex",gap:"8px"},
    input: {flex:1,background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:"6px",
      padding:"8px 12px",color:C.text,fontSize:fs(12),fontFamily:"'DM Mono',monospace",
      outline:"none",resize:"none"},
    sendBtn: {background:C.accent,color:C.bg,border:"none",borderRadius:"6px",padding:"8px 14px",
      fontSize:fs(11),fontWeight:700,cursor:"pointer",fontFamily:"'DM Mono',monospace",
      opacity:loading?0.5:1}
  };

  return <div style={chatStyles.panel}>
    <div style={chatStyles.header}>
      <span>AI 분석</span>
      <span style={{fontSize:fs(9),color:C.textDim,marginLeft:"8px",fontWeight:400}}>{yesterday}</span>
      <button onClick={()=>setShowKeyInput(p=>!p)}
        style={{float:"right",background:"none",border:"none",color:C.muted,fontSize:fs(9),cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>KEY</button>
    </div>

    {showKeyInput && <div style={{padding:"12px",borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontSize:fs(10),color:C.textDim,marginBottom:"6px"}}>Anthropic API Key</div>
      <div style={{display:"flex",gap:"6px"}}>
        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")saveKey();}}
          placeholder="sk-ant-..."
          style={{...chatStyles.input,flex:1}} />
        <button onClick={saveKey}
          style={{background:C.green,color:C.bg,border:"none",borderRadius:"4px",padding:"6px 12px",
            fontSize:fs(10),fontWeight:700,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>저장</button>
      </div>
    </div>}

    <div style={chatStyles.msgArea}>
      {messages.map((m,i) => <div key={i}
        style={m.role==="user"?chatStyles.msgUser:m.role==="error"?chatStyles.msgErr:m.role==="db"?{...chatStyles.msgBot,fontSize:fs(9),color:C.yellow,padding:"4px 10px",opacity:0.7}:chatStyles.msgBot}>
        {m.content}
      </div>)}
      {loading && <div style={{...chatStyles.msgBot,animation:"pulse 1.2s infinite",color:C.textDim}}>분석 중...</div>}
      <div ref={messagesEndRef}/>
    </div>

    <div style={chatStyles.inputArea}>
      <textarea rows={1} value={input} onChange={e=>setInput(e.target.value)}
        onKeyDown={handleKeyDown} placeholder="질문하세요..." style={chatStyles.input}/>
      <button onClick={sendMessage} disabled={loading} style={chatStyles.sendBtn}>전송</button>
    </div>
  </div>;
}

function KPISection({date, endDate, rangeMode, onLoad, activeTab, onTabChange, sec2Totals, acctFilter, onAcctChange}) {
  const [rawData, setRawData] = useState(null);
  const [err, setErr] = useState(null);
  const [realtimeData, setRealtimeData] = useState(null);
  const [realtimeLoading, setRealtimeLoading] = useState(false);
  const [realtimeErr, setRealtimeErr] = useState(null);

  useEffect(() => {
    setRawData(null); setErr(null); onAcctChange("ALL"); onTabChange("yesterday");
    setRealtimeData(null); setRealtimeErr(null);
    const qDate = rangeMode
      ? {"report_date=gte":date,"report_date=lte":endDate}
      : {"report_date=eq":date};
    (async () => {
      try {
        const qFn = rangeMode ? sbQueryAll : sbQuery;
        const [margin, adsRaw, prods, sales] = await Promise.all([
          qFn("margin_daily","option_id,revenue,margin,sales_qty,account",qDate),
          qFn("ads_daily","option_id,ad_cost,sales_qty_1d",qDate),
          sbQueryAll("products","option_id,account",{}),
          qFn("sales_daily","option_id,account",qDate),
        ]);
        const acctMap = {};
        sales.forEach(r=>{ if(r.account) acctMap[r.option_id]=r.account; });
        prods.forEach(p=>{ if(p.account) acctMap[p.option_id]=p.account; });
        margin.forEach(r=>{ if(r.account) acctMap[r.option_id]=r.account; });
        const acctSet = new Set();
        margin.forEach(r=>{ const a=acctMap[r.option_id]; if(a) acctSet.add(a); });
        const rawObj = {margin, adsRaw, acctMap, accounts:[...acctSet].sort()};
        setRawData(rawObj);
        if(onLoad) {
          const adT = {};
          adsRaw.forEach(a => {
            if(!adT[a.option_id]) adT[a.option_id]={ad_cost:0,sales_qty_1d:0};
            adT[a.option_id].ad_cost+=(a.ad_cost||0); adT[a.option_id].sales_qty_1d+=(a.sales_qty_1d||0);
          });
          const rv = margin.reduce((s,r)=>s+(r.revenue||0),0);
          const qt = margin.reduce((s,r)=>s+(r.sales_qty||0),0);
          const ac = Object.values(adT).reduce((s,a)=>s+(a.ad_cost||0),0);
          const aq = Object.values(adT).reduce((s,a)=>s+(a.sales_qty_1d||0),0);
          const tm = margin.reduce((s,r)=>s+((r.margin||0)*(r.sales_qty||0)),0);
          onLoad({rev:rv, adCost:ac, totalMargin:tm, adRatio:qt>0?((aq/qt)*100).toFixed(1):0, qty:qt, adQty:aq});
        }
      } catch(e){ setErr(e.message); }
    })();
  }, [date, endDate, rangeMode]);

  const loadRealtime = async () => {
    setRealtimeLoading(true); setRealtimeErr(null);
    try {
      const data = await sbQuery("sales_realtime","option_id,revenue,orders,sales_qty,visitors,crawled_at,account",{});
      if(!data || data.length===0) { setRealtimeData([]); }
      else { setRealtimeData(data); }
    } catch(e) { setRealtimeErr(e.message); }
    finally { setRealtimeLoading(false); }
  };

  const handleTabChange = (tab) => {
    onTabChange(tab);
    if(tab==="realtime" && !realtimeData) loadRealtime();
  };

  if (err) return <ErrBox msg={err}/>;
  if (!rawData) return <Spinner/>;

  const {margin, adsRaw, acctMap, accounts} = rawData;

  // 탭 스타일
  const tabStyle = (active) => ({
    background:active?C.accent+"22":"transparent", border:`1px solid ${active?C.accent:C.border}`,
    color:active?C.accent:C.textDim, borderRadius:"4px", padding:"5px 14px",
    fontSize:fs(11), cursor:"pointer", fontFamily:"'DM Mono',monospace", fontWeight:active?700:400
  });

  // 실시간 탭일 때
  if(activeTab==="realtime") {
    if(realtimeLoading) return <div>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
        <button onClick={()=>handleTabChange("yesterday")} style={tabStyle(false)}>어제 확정</button>
        <button style={tabStyle(true)}>실시간</button>
      </div>
      <Spinner/>
    </div>;
    if(realtimeErr) return <div>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
        <button onClick={()=>handleTabChange("yesterday")} style={tabStyle(false)}>어제 확정</button>
        <button style={tabStyle(true)}>실시간</button>
      </div>
      <ErrBox msg={realtimeErr}/>
    </div>;
    if(!realtimeData || realtimeData.length===0) return <div>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
        <button onClick={()=>handleTabChange("yesterday")} style={tabStyle(false)}>어제 확정</button>
        <button style={tabStyle(true)}>실시간</button>
      </div>
      <div style={{...s.card,color:C.textDim,textAlign:"center",fontSize:fs(12),padding:"32px"}}>
        수집 데이터 없음 — 터미널에서 <span style={{color:C.accent}}>python tools/fetch_realtime.py</span> 실행
      </div>
    </div>;

    const fRT = acctFilter==="ALL" ? realtimeData : realtimeData.filter(r=>r.account===acctFilter);
    const rtAccts = [...new Set(realtimeData.map(r=>r.account).filter(Boolean))].sort();
    const rtRev = fRT.reduce((s,r)=>s+(r.revenue||0),0);
    const rtOrders = fRT.reduce((s,r)=>s+(r.orders||0),0);
    const rtQty = fRT.reduce((s,r)=>s+(r.sales_qty||0),0);
    const rtVisitors = fRT.reduce((s,r)=>s+(r.visitors||0),0);
    const crawledAt = realtimeData[0]?.crawled_at;
    const crawledTime = crawledAt ? new Date(crawledAt).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}) : null;

    const kpis = [
      { label:"실시간 매출", val:fmtWon(rtRev), sub:`주문 ${fmtNum(rtOrders)}건`, color:C.accent, dim:C.accentDim },
      { label:"판매수량", val:fmtNum(rtQty), sub:`오늘 누적`, color:C.yellow, dim:C.yellowDim },
      { label:"방문자", val:fmtNum(rtVisitors), sub:`오늘 누적`, color:C.green, dim:C.greenDim },
    ];
    return <div>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px",alignItems:"center"}}>
        <button onClick={()=>handleTabChange("yesterday")} style={tabStyle(false)}>어제 확정</button>
        <button style={tabStyle(true)}>실시간</button>
        <button onClick={loadRealtime} style={{...tabStyle(false),fontSize:fs(13),padding:"4px 8px",lineHeight:1}} title="새로고침">↻</button>
        <AcctButtons accounts={rtAccts} current={acctFilter} onChange={onAcctChange}/>
        {crawledTime && <span style={{fontSize:fs(10),color:C.textDim,marginLeft:"auto"}}>마지막 수집: {crawledTime}</span>}
      </div>
      <div style={s.kpiGrid}>
        {kpis.map(k => <div key={k.label} style={{
          background:`linear-gradient(135deg,${C.surface} 60%,${k.dim})`,
          border:`1px solid ${k.color}44`, borderRadius:"8px", padding:"20px 24px",
          position:"relative", overflow:"hidden", animation:"fadeIn 0.4s ease"
        }}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:k.color}}/>
          <div style={{fontSize:fs(10),fontWeight:700,letterSpacing:"0.18em",color:C.textDim,textTransform:"uppercase",marginBottom:"8px"}}>{k.label}</div>
          <div style={{fontSize:fs(26),fontWeight:700,color:k.color,letterSpacing:"-0.02em",lineHeight:1,marginBottom:"4px"}}>{k.val}</div>
          <div style={{fontSize:fs(11),color:C.textDim}}>{k.sub}</div>
        </div>)}
      </div>
    </div>;
  }

  // 어제 확정 탭 — sec2Totals 우선 사용 (섹션 2와 일치)
  const t = sec2Totals || null;
  const fMargin = acctFilter==="ALL" ? margin : margin.filter(r=>acctMap[r.option_id]===acctFilter);
  const fAds = acctFilter==="ALL" ? adsRaw : adsRaw.filter(r=>acctMap[r.option_id]===acctFilter);

  const adTotals = {};
  fAds.forEach(a => {
    if(!adTotals[a.option_id]) adTotals[a.option_id] = {ad_cost:0, sales_qty_1d:0};
    adTotals[a.option_id].ad_cost += (a.ad_cost||0);
    adTotals[a.option_id].sales_qty_1d += (a.sales_qty_1d||0);
  });

  const rev = (t && acctFilter==="ALL") ? t.rev : fMargin.reduce((s,r)=>s+(r.revenue||0),0);
  const qty = (t && acctFilter==="ALL") ? t.qty : fMargin.reduce((s,r)=>s+(r.sales_qty||0),0);
  const adCost = (t && acctFilter==="ALL") ? t.adCost : Object.values(adTotals).reduce((s,a)=>s+(a.ad_cost||0),0);
  const adQty = (t && acctFilter==="ALL") ? t.adQty : Object.values(adTotals).reduce((s,a)=>s+(a.sales_qty_1d||0),0);
  const totalMargin = (t && acctFilter==="ALL") ? t.totalMargin : fMargin.reduce((s,r)=>s+((r.margin||0)*(r.sales_qty||0)),0);
  const adRatio = qty>0?((adQty/qty)*100).toFixed(1):0;

  const kpis = [
    { label:"총 매출", val:fmtWon(rev), sub:`판매 ${fmtNum(qty)}건`, color:C.accent, dim:C.accentDim },
    { label:"총 광고비", val:fmtWon(adCost), sub:`광고판매 ${fmtNum(adQty)}건 (${adRatio}%)`, color:C.yellow, dim:C.yellowDim },
    { label:"순이익 (추정)", val:fmtWon(totalMargin), sub:`마진율 ${rev>0?((totalMargin/rev)*100).toFixed(1):0}% · margin_daily 기준`, color:C.green, dim:C.greenDim },
  ];
  return <div>
    <div style={{display:"flex",gap:"8px",marginBottom:"14px",alignItems:"center"}}>
      <button style={tabStyle(true)}>어제 확정</button>
      <button onClick={()=>handleTabChange("realtime")} style={tabStyle(false)}>실시간</button>
      <AcctButtons accounts={accounts} current={acctFilter} onChange={onAcctChange}/>
    </div>
    <div style={s.kpiGrid}>
      {kpis.map(k => <div key={k.label} style={{
        background:`linear-gradient(135deg,${C.surface} 60%,${k.dim})`,
        border:`1px solid ${k.color}44`, borderRadius:"8px", padding:"20px 24px",
        position:"relative", overflow:"hidden", animation:"fadeIn 0.4s ease"
      }}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:k.color}}/>
        <div style={{fontSize:fs(10),fontWeight:700,letterSpacing:"0.18em",color:C.textDim,textTransform:"uppercase",marginBottom:"8px"}}>{k.label}</div>
        <div style={{fontSize:fs(26),fontWeight:700,color:k.color,letterSpacing:"-0.02em",lineHeight:1,marginBottom:"4px"}}>{k.val}</div>
        <div style={{fontSize:fs(11),color:C.textDim}}>{k.sub}</div>
      </div>)}
    </div>
  </div>;
}

// ── 섹션 2: 어제 판매 트리 ────────────────────────────
function YesterdaySales({date, endDate, rangeMode, onLoad, activeTab, acctFilter, onAcctChange}) {
  const [rows, setRows] = useState(null);
  const [exp, setExp] = useState({});
  const [err, setErr] = useState(null);
  const [accounts, setAccounts] = useState([]);
  const [salesOnly, setSalesOnly] = useState(true);
  const [hideMode, setHideMode] = useState("hide");
  const [kwMode, setKwMode] = useState(false);
  const [invMode, setInvMode] = useState(false);
  const [hiddenSet, setHiddenSet] = useState(new Set());
  const [stockManual, setStockManual] = useState({});
  const [displayOrder, setDisplayOrder] = useState({});

  useEffect(() => {
    sbQuery("hidden_options","option_id",{}).then(rows => setHiddenSet(new Set(rows.map(r=>r.option_id)))).catch(()=>{});
    sbQuery("stock_manual","option_id,incoming,ordered",{}).then(rows => {
      const m={}; rows.forEach(r=>m[r.option_id]={incoming:r.incoming||0,ordered:r.ordered||0}); setStockManual(m);
    }).catch(()=>{});
    sbQuery("display_order","id,sort_order",{}).then(rows => {
      const m={}; rows.forEach(r=>m[r.id]=r.sort_order); setDisplayOrder(m);
    }).catch(()=>{});
  }, []);

  const applyOrder = (items, keyFn) => {
    return [...items].sort((a,b) => {
      const oa = displayOrder[keyFn(a)] ?? 9999, ob = displayOrder[keyFn(b)] ?? 9999;
      if(oa !== ob) return oa - ob;
      return 0; // keep original order if same
    });
  };

  const moveItem = async (id, dir, listIds) => {
    const idx = listIds.indexOf(id);
    if((dir==="up"&&idx<=0)||(dir==="down"&&idx>=listIds.length-1)) return;
    const newList = [...listIds];
    const targetIdx = dir==="up"?idx-1:idx+1;
    newList.splice(idx, 1);
    newList.splice(targetIdx, 0, id);
    const newOrder = {...displayOrder};
    newList.forEach((lid, i) => { newOrder[lid] = i; });
    setDisplayOrder(newOrder);
    await sbUpsert("display_order", newList.map((lid,i)=>({id:lid,sort_order:i}))).catch(()=>{});
  };

  const toggleHidden = async (optionId) => {
    const next = new Set(hiddenSet);
    if(next.has(optionId)) {
      next.delete(optionId);
      await sbDelete("hidden_options",{option_id:optionId}).catch(()=>{});
    } else {
      next.add(optionId);
      await sbInsert("hidden_options",{option_id:optionId}).catch(()=>{});
    }
    setHiddenSet(next);
  };

  useEffect(() => {
    setRows(null); setErr(null); setExp({});
    const isRealtime = activeTab==="realtime";
    const qDate = rangeMode
      ? {"report_date=gte":date,"report_date=lte":endDate}
      : {"report_date=eq":date};
    const refDate = rangeMode ? endDate : date;
    (async () => {
      try {
        // 최신 snapshot_date 조회
        const snapMeta = await sbQuery("inventory_snapshots","snapshot_date",
          {"order":"snapshot_date.desc","limit":"1"});
        const latestSnap = snapMeta.length>0 ? snapMeta[0].snapshot_date : refDate;

        // 7일 히스토리: 선택 날짜 기준 앞뒤 3일 (끝이면 앞 6일)
        const selD = new Date(refDate+"T00:00:00");
        const ydD = new Date(getYesterday()+"T00:00:00");
        const daysAfterAvail = Math.round((ydD - selD) / 86400000);
        const histAfter = Math.min(3, daysAfterAvail);
        const histBefore = 6 - histAfter;
        const hist7start = shiftDate(refDate, -histBefore);
        const hist7end = shiftDate(refDate, histAfter);

        let [sales, adsRaw, margin, inv, prods, sales7d, ads7d, invHist, costData, exRateData, marginHist] = await Promise.all([
          isRealtime
            ? sbQuery("sales_realtime","option_id,views,sales_qty,revenue,visitors,account,crawled_at",{})
            : (rangeMode ? sbQueryAll : sbQuery)("sales_daily","option_id,views,conversion_rate,sales_qty,cancel_qty",qDate),
          isRealtime ? Promise.resolve([]) : (rangeMode ? sbQueryAll : sbQuery)("ads_daily","option_id,ad_cost,sales_qty_1d,keyword,impressions,clicks,orders_1d",qDate),
          isRealtime ? Promise.resolve([]) : (rangeMode ? sbQueryAll : sbQuery)("margin_daily","option_id,product_name,option_name,margin,margin_rate,account,revenue",qDate),
          sbQuery("inventory_snapshots","option_id,stock,is_item_winner,sales_7d,sales_30d",{"snapshot_date=eq":latestSnap}),
          sbQueryAll("products","option_id,account,product_id,vendor_item_id,fulfillment_type,product_name,option_name",{}),
          isRealtime ? Promise.resolve([]) : sbQueryAll("sales_daily","option_id,views,sales_qty,conversion_rate,revenue,cancel_qty,report_date",
            {"report_date=gte":hist7start,"report_date=lte":hist7end}),
          isRealtime ? Promise.resolve([]) : sbQueryAll("ads_daily","option_id,ad_cost,report_date",
            {"report_date=gte":hist7start,"report_date=lte":hist7end}),
          isRealtime ? Promise.resolve([]) : sbQueryAll("inventory_snapshots","option_id,stock,snapshot_date",
            {"snapshot_date=gte":hist7start,"snapshot_date=lte":hist7end}),
          sbQuery("cost_history","option_id,cost",{"order":"start_date.desc"}),
          sbQuery("exchange_rate_history","option_id,exchange_rate",{"order":"start_date.desc"}),
          isRealtime ? Promise.resolve([]) : sbQueryAll("margin_daily","option_id,margin_rate,report_date",
            {"report_date=gte":hist7start,"report_date=lte":hist7end}),
        ]);

        // 실시간 모드: sales_realtime에서 revenue 직접 제공, conversion_rate 계산
        if(isRealtime) {
          sales.forEach(r => {
            r.conversion_rate = r.views>0 ? (r.sales_qty/r.views)*100 : 0;
          });
        }

        // 기간 모드: sales/ads를 option_id별로 사전 집계 (각 옵션이 1행이 되도록)
        if(rangeMode && !isRealtime) {
          const sAgg = {};
          sales.forEach(r => {
            if(!sAgg[r.option_id]) sAgg[r.option_id] = {option_id:r.option_id, views:0, sales_qty:0, cancel_qty:0, conversion_rate:0, _days:0};
            const a = sAgg[r.option_id];
            a.views += (r.views||0); a.sales_qty += (r.sales_qty||0);
            a.cancel_qty += (r.cancel_qty||0); a.conversion_rate += (r.conversion_rate||0); a._days++;
          });
          Object.values(sAgg).forEach(a => { a.conversion_rate = a._days>0 ? a.conversion_rate/a._days : 0; });
          sales = Object.values(sAgg);

          const aAgg = {};
          adsRaw.forEach(r => {
            const key = r.option_id+"|"+(r.keyword||"-");
            if(!aAgg[key]) aAgg[key] = {option_id:r.option_id, keyword:r.keyword, ad_cost:0, sales_qty_1d:0, impressions:0, clicks:0, orders_1d:0};
            const a = aAgg[key];
            a.ad_cost += (r.ad_cost||0); a.sales_qty_1d += (r.sales_qty_1d||0);
            a.impressions += (r.impressions||0); a.clicks += (r.clicks||0); a.orders_1d += (r.orders_1d||0);
          });
          adsRaw = Object.values(aAgg);
        }

        // 7일 날짜 리스트 생성
        const totalHistDays = histBefore + histAfter + 1;
        const hist7dates = [];
        for(let i=0;i<totalHistDays;i++) {
          hist7dates.push(shiftDate(refDate, -histBefore+i));
        }

        // 히스토리 맵: histMap[option_id] = {views:[{dt,v},...], qty:[...], cr:[...], stock:[...], adCost:[...]}
        const histMap = {};
        const ensureHist = (oid) => {
          if(!histMap[oid]) histMap[oid]={views:{},qty:{},cr:{},stock:{},adCost:{},revenue:{},cancel:{},marginRate:{}};
        };
        sales7d.forEach(r => {
          ensureHist(r.option_id);
          const h = histMap[r.option_id];
          h.views[r.report_date] = (h.views[r.report_date]||0)+(r.views||0);
          h.qty[r.report_date] = (h.qty[r.report_date]||0)+(r.sales_qty||0);
          h.cr[r.report_date] = r.conversion_rate||0;
          h.revenue[r.report_date] = (h.revenue[r.report_date]||0)+(r.revenue||0);
          h.cancel[r.report_date] = (h.cancel[r.report_date]||0)+Math.abs(r.cancel_qty||0);
        });
        ads7d.forEach(r => {
          ensureHist(r.option_id);
          histMap[r.option_id].adCost[r.report_date] = (histMap[r.option_id].adCost[r.report_date]||0)+(r.ad_cost||0);
        });
        marginHist.forEach(r => {
          ensureHist(r.option_id);
          histMap[r.option_id].marginRate[r.report_date] = r.margin_rate||0;
        });
        invHist.forEach(r => {
          ensureHist(r.option_id);
          histMap[r.option_id].stock[r.snapshot_date] = r.stock||0;
        });

        // 히스토리 배열 변환 함수
        const getHist = (oid, field) => {
          const h = histMap[oid];
          if(!h) return [];
          const map = h[field]||{};
          return hist7dates.map(dt=>({dt, v:map[dt]||0}));
        };

        // 옵션별 7일 평균 (조회수, 판매량, 전환율)
        const avg7d = {};
        sales7d.forEach(r => {
          if(!avg7d[r.option_id]) avg7d[r.option_id]={views:0,qty:0,cr:0,days:new Set()};
          const a = avg7d[r.option_id];
          a.views += (r.views||0);
          a.qty += (r.sales_qty||0);
          a.cr += (r.conversion_rate||0);
          a.days.add(r.report_date);
        });
        const viewsAvgMap = {}, qtyAvgMap = {}, crAvgMap = {};
        Object.entries(avg7d).forEach(([oid,a]) => {
          const days = a.days.size || 1;
          viewsAvgMap[oid] = a.views / days;
          qtyAvgMap[oid] = a.qty / days;
          crAvgMap[oid] = a.cr / days;
        });

        // 계정 맵 + 상품링크 맵 + fulfillment맵
        const acctMap = {}; const linkMap = {}; const ftMap = {};
        prods.forEach(p => {
          if(p.account) acctMap[p.option_id]=p.account;
          if(p.vendor_item_id && p.option_id)
            linkMap[p.option_id]=`https://www.coupang.com/vp/products/${p.vendor_item_id}?vendorItemId=${p.option_id}`;
          if(p.fulfillment_type) ftMap[p.option_id]=p.fulfillment_type;
        });
        margin.forEach(m => { if(m.account) acctMap[m.option_id]=m.account; });
        if(isRealtime) sales.forEach(r => { if(r.account) acctMap[r.option_id]=r.account; });

        // 재고 맵 + 아이템위너 맵 + 판매속도 맵
        const invMap = {}; const winnerMap = {}; const sales7dMap = {}; const sales30dMap = {};
        inv.forEach(i => { invMap[i.option_id]=(i.stock||0); winnerMap[i.option_id]=i.is_item_winner; sales7dMap[i.option_id]=i.sales_7d||0; sales30dMap[i.option_id]=i.sales_30d||0; });
        // 원가 맵 (option_id → 최신 cost) — 이미 start_date desc로 정렬됨
        const costMap = {};
        costData.forEach(c => { if(!costMap[c.option_id]) costMap[c.option_id]=c.cost||0; });
        // 환율 맵 (option_id → 최신 exchange_rate)
        const exRateMap = {};
        exRateData.forEach(e => { if(!exRateMap[e.option_id]) exRateMap[e.option_id]=Number(e.exchange_rate)||1; });

        // 광고: option_id별 합산 + 키워드 맵 (상세 데이터 포함)
        const adMap = {};
        const kwMap = {}; // option_id → [keyword_name]
        const kwDetailMap = {}; // "option_id|keyword" → {ad_cost, impressions, clicks, orders, qty}
        adsRaw.forEach(a => {
          if(!adMap[a.option_id]) adMap[a.option_id]={ad_cost:0,sales_qty_1d:0,clicks:0};
          adMap[a.option_id].ad_cost += (a.ad_cost||0);
          adMap[a.option_id].sales_qty_1d += (a.sales_qty_1d||0);
          adMap[a.option_id].clicks += (a.clicks||0);
          // 키워드별 상세 데이터 합산
          const kwKey = a.option_id+"|"+(a.keyword||"-");
          if(!kwDetailMap[kwKey]) kwDetailMap[kwKey]={ad_cost:0,impressions:0,clicks:0,orders:0,qty:0};
          const kd = kwDetailMap[kwKey];
          kd.ad_cost += (a.ad_cost||0);
          kd.impressions += (a.impressions||0);
          kd.clicks += (a.clicks||0);
          kd.orders += (a.orders_1d||0);
          kd.qty += (a.sales_qty_1d||0);
          if((a.sales_qty_1d||0)>0) {
            if(!kwMap[a.option_id]) kwMap[a.option_id]=[];
            kwMap[a.option_id].push(a.keyword);
          }
        });
        const mMap = {};
        if(rangeMode) {
          // 기간 모드: option_id별 revenue/margin 합산
          const mAgg = {};
          margin.forEach(m => {
            if(!mAgg[m.option_id]) mAgg[m.option_id] = {product_name:m.product_name, option_name:m.option_name,
              account:m.account, revenue:0, marginSum:0, salesQty:0, days:0};
            const a = mAgg[m.option_id];
            a.revenue += (m.revenue||0);
            a.marginSum += (m.margin||0) * 1; // 개당 마진 합산용
            a.salesQty += 1; // margin_rate 평균용 카운트
            a.days++;
            // 가중 마진율: 합산은 나중에 revenue 기준으로 계산
            if(!a._mrSum) a._mrSum = 0;
            a._mrSum += (m.margin_rate||0) * (m.revenue||0);
            a._revSum = (a._revSum||0) + (m.revenue||0);
          });
          Object.entries(mAgg).forEach(([oid, a]) => {
            mMap[oid] = {product_name:a.product_name, option_name:a.option_name, account:a.account,
              revenue:a.revenue, margin:a.days>0?a.marginSum/a.days:null,
              margin_rate:a._revSum>0?a._mrSum/a._revSum:null};
          });
        } else {
          margin.forEach(m => mMap[m.option_id] = m);
        }
        // products 테이블에서 상품명/옵션명 보충 (margin에 없는 옵션)
        prods.forEach(p => {
          if(!mMap[p.option_id]) {
            if(p.product_name) {
              mMap[p.option_id] = {product_name:p.product_name, option_name:p.option_name||"-",
                account:p.account, revenue:null, margin:null, margin_rate:null};
            }
          }
        });
        // 실시간 모드: sales_realtime에서 revenue 직접 사용
        if(isRealtime) {
          sales.forEach(r => {
            const m = mMap[r.option_id];
            if(m) m.revenue = r.revenue||0;
          });
        }

        // 계정 목록 추출
        const acctSet = new Set();
        sales.forEach(row => { const a=acctMap[row.option_id]; if(a) acctSet.add(a); });
        setAccounts([...acctSet].sort());

        // 옵션 병합: 같은 product_name + option_name → 한 행 (윙+그로스 합산)
        const grouped = {};
        const mergeMap = {}; // key: "pName|optName" → merged opt object
        sales.forEach(row => {
          const m = mMap[row.option_id]||{};
          const pName = m.product_name||row.option_id;
          const optName = m.option_name||"-";
          const ad = adMap[row.option_id]||{};
          const revenue = m.revenue!=null ? m.revenue : (row.revenue||0);
          const netProfit = m.margin!=null ? (m.margin*(row.sales_qty||0)) : null;
          const account = acctMap[row.option_id]||"-";
          const stock = invMap[row.option_id];
          const ft = ftMap[row.option_id]||"";
          const isWing = ft==="윙";
          const isRocketNotWinner = ft==="로켓그로스" && winnerMap[row.option_id]===false && (stock||0)>0;
          const link = linkMap[row.option_id]||null;
          const viewsAvg7d = viewsAvgMap[row.option_id]||null;
          const qtyAvg7d = qtyAvgMap[row.option_id]||null;
          const crAvg7d = crAvgMap[row.option_id]||null;

          if(!grouped[pName]) grouped[pName]={pName, opts:[], rev:0, qty:0, adCost:0, profit:0, views:0, account};

          const mergeKey = `${pName}|${optName}`;
          if(mergeMap[mergeKey]) {
            // 기존 병합 옵션에 합산
            const o = mergeMap[mergeKey];
            o.views = (o.views||0) + (row.views||0);
            o.sales_qty = (o.sales_qty||0) + (row.sales_qty||0);
            o.revenue = (o.revenue||0) + revenue;
            o.adCost = (o.adCost||0) + (ad.ad_cost||0);
            o.adQty = (o.adQty||0) + (ad.sales_qty_1d||0);

            if(o.histViews) o.histViews=o.histViews.map((d,i)=>({dt:d.dt,v:d.v+(hv[i]?.v||0)}));

            const hmr=getHist(row.option_id,"marginRate");

              adQty:ad.sales_qty_1d||0, clicks:ad.clicks||0, margin:m.margin, marginRate:m.margin_rate, netProfit, account, stock,

              unitCost: costMap[row.option_id]||0, exRate: exRateMap[row.option_id]||1,
              optionIds: [row.option_id],
              keywords: kwMap[row.option_id] ? [...kwMap[row.option_id]] : [],
              kwDetails: Object.fromEntries(Object.entries(kwDetailMap).filter(([k])=>k.startsWith(row.option_id+"|")).map(([k,v])=>[k.split("|")[1],v])),
              histViews: getHist(row.option_id,"views"),

            if(isWing && link) opt._wingLink = link; // 윙 링크 백업
            mergeMap[mergeKey] = opt;
            grouped[pName].opts.push(opt);
          }

          grouped[pName].qty += (row.sales_qty||0);
          grouped[pName].views += (row.views||0);
          grouped[pName].adCost += (ad.ad_cost||0);
          if(netProfit!=null) grouped[pName].profit += netProfit;
        });
        // 로켓그로스 링크 없으면 윙 링크 사용
        Object.values(mergeMap).forEach(o => { if(!o.link && o._wingLink) o.link = o._wingLink; });

        const result = Object.values(grouped).sort((a,b)=>b.rev-a.rev);

        // 전체 합계 계산 (salesOnly 필터 전)

          t.rev+=g.rev; t.qty+=g.qty; t.views+=g.views; t.adCost+=g.adCost; t.profit+=g.profit;

        allTotals.totalMargin = allTotals.profit;

  }, [date, endDate, rangeMode, activeTab]);

  const toggle = name => setExp(p=>({...p,[name]:!p[name]}));

  if(Object.keys(displayOrder).length>0) {

        {kwMode ? <tr style={{background:C.accentDim}}>

          const gWingQty = visibleOpts.reduce((s,o)=>s+(o.wingQty||0),0);
          const gProfit = visibleOpts.reduce((s,o)=>s+(o.netProfit||0),0);
          const gStock = visibleOpts.reduce((s,o)=>s+(o.stock!=null?o.stock:0),0);

          const gHistCr = gHistViews && gHistQty ? gHistViews.map((d,i)=>({dt:d.dt,v:d.v>0?((gHistQty[i]?.v||0)/d.v)*100:0})) : null;

              : invMode ? (()=>{
                const gS7d=visibleOpts.reduce((s,o)=>s+(o.sales7d||0),0);

                const gInc=visibleOpts.reduce((s,o)=>s+((stockManual[(o.optionIds||[o.option_id])[0]]||{}).incoming||0),0);

                const need14_30=avg30*14, need14_7=avg7*14;

                const order30=Math.max(0,Math.round(need14_30-gTotal)), order7=Math.max(0,Math.round(need14_7-gTotal));
                const gWkRows=[
                  {label:"1주후",v30:Math.round(gTotal-avg30*7),v7:Math.round(gTotal-avg7*7)},
                  {label:"2주후",v30:remain30,v7:remain7},
                  {label:"3주후",v30:Math.round(gTotal-avg30*21),v7:Math.round(gTotal-avg7*21)}

                <td style={s.td}>{gInc>0?fmtNum(gInc):<span style={{color:C.muted}}>-</span>}</td>
                <td style={s.td}>{gOrd>0?fmtNum(gOrd):<span style={{color:C.muted}}>-</span>}</td>
                <td style={{...s.td,fontWeight:600}}>{fmtNum(gTotal)}</td>

                </td>

                    const ts=((o.stock||0)+(sm2.incoming||0)+(sm2.ordered||0));
                    const need=Math.max(0,Math.round(((o.sales30d||0)/30)*14-ts));

              {(()=>{const ac=Math.abs(o.cancel_qty||0); const total=(o.sales_qty||0)+ac; const rate=total>0?(ac/total*100):0;
                return <td style={{...s.td,color:rate>30?C.red:C.text}}>
                  {ac>0?<HoverTip hist={o.histCancel} label="취소" fmt={v=>`-${fmtNum(v)}`} selectedDate={date}
                    subHist={o.histQty} subFmt={(cancel,qty)=>{const t=(qty||0)+cancel; return t>0?`(${fmtPct(cancel/t*100)})`:""}}>
                    -{fmtNum(ac)}<span style={{fontSize:fs(9),color:C.textDim,marginLeft:"2px"}}>({fmtPct(rate)})</span>
                  </HoverTip>:<span style={{color:C.muted}}>-</span>}

              <td style={s.td}>
                <HoverTip hist={o.histRevenue} label="매출" fmt={fmtWon} selectedDate={date}
                  extraLine={(o.sales_qty||0)>0?"개당 "+fmtWon(Math.round((o.revenue||0)/(o.sales_qty||1))):null}>
                  {fmtWon(o.revenue)}
                </HoverTip>
              </td>
              <td style={s.td}>{o.adQty>0?<span style={{color:C.yellow}}>{fmtNum(o.adQty)}건</span>:<span style={{color:C.muted}}>-</span>}</td>
              <td style={s.td}>
                <HoverTip hist={o.histAdCost} label="광고비" fmt={fmtWon} selectedDate={date}>
                  {o.adCost>0?<span style={{color:C.yellow}}>{fmtWon(o.adCost)}</span>:<span style={{color:C.muted}}>-</span>}

              </td>
              <td style={{...s.td,color:o.netProfit>0?C.green:o.netProfit!=null?C.red:C.muted}}>

// ── 날짜 슬라이더 ────────────────────────────────────
function DateSlider({date, endDate, rangeMode, onDateChange, onEndDateChange, onRangeModeToggle}) {
  const yesterday = getYesterday();
  const dateInputStyle = {background:C.surfaceHigh,color:C.text,border:`1px solid ${C.border}`,
    borderRadius:"4px",padding:"3px 8px",fontSize:fs(11),fontFamily:"'DM Mono',monospace",
    outline:"none",cursor:"pointer",width:"130px"};

  // ◀ [날짜] ===●=== [날짜] ▶  +  단일/기간 버튼
  return <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1}}>
    <button onClick={()=>{const p=shiftDate(date,-1); onDateChange(p); if(!rangeMode) onEndDateChange(p);}}
      style={{background:"none",border:`1px solid ${C.border}`,color:C.accent,borderRadius:"4px",
        padding:"2px 8px",fontSize:fs(14),cursor:"pointer",lineHeight:1}}>◀</button>

    <input type="date" value={date} onChange={e=>onDateChange(e.target.value)} style={dateInputStyle} />

    {rangeMode && <span style={{color:C.textDim,fontSize:fs(11)}}>~</span>}
    {rangeMode && <input type="date" value={endDate||date} onChange={e=>onEndDateChange(e.target.value)} style={dateInputStyle} />}

    <button onClick={()=>{const n=shiftDate(date,1); if(n<=yesterday){onDateChange(n); if(!rangeMode) onEndDateChange(n);}}}
      style={{background:"none",border:`1px solid ${C.border}`,color:C.accent,borderRadius:"4px",
        padding:"2px 8px",fontSize:fs(14),cursor:"pointer",lineHeight:1}}>▶</button>

    <button onClick={onRangeModeToggle}
      style={{background:rangeMode?C.accent+"22":"transparent",border:`1px solid ${rangeMode?C.accent:C.border}`,
        color:rangeMode?C.accent:C.textDim,borderRadius:"4px",padding:"3px 10px",
        fontSize:fs(10),cursor:"pointer",fontFamily:"'DM Mono',monospace",fontWeight:rangeMode?700:400,
        whiteSpace:"nowrap"}}>{rangeMode?"기간":"단일"}</button>

    {!rangeMode && date!==getYesterday() && <button onClick={()=>onDateChange(getYesterday())}
      style={{background:"none",border:`1px solid ${C.border}`,color:C.accent,
        borderRadius:"4px",padding:"3px 8px",fontSize:fs(10),cursor:"pointer",
        fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>어제로</button>}
  </div>;
}

// ── 메인 앱 ───────────────────────────────────────────
function App() {
  const [date, setDate] = useState(getYesterday());
  const [endDate, setEndDate] = useState(getYesterday());
  const [rangeMode, setRangeMode] = useState(false);
  const [dashboardCtx, setDashboardCtx] = useState({});
  const [activeTab, setActiveTab] = useState("yesterday");
  const [sec2Totals, setSec2Totals] = useState(null);
  const [fontSizeKey, setFontSizeKey] = useState("M");
  const [theme, setTheme] = useState("dark");
  const [acctFilter, setAcctFilter] = useState("ALL");

  // 기간 모드에서 사용할 날짜
  const effectiveDate = date;
  const effectiveEndDate = rangeMode ? endDate : date;
  const yesterday = getYesterday();

  // 날짜 변경 시 endDate도 조정
  const handleDateChange = (d) => {
    setDate(d);
    if(!rangeMode) setEndDate(d);
    else if(new Date(d)>new Date(endDate)) setEndDate(d);
  };

  const cycleFontSize = () => {
    const keys = ["S","M","L"];
    const next = keys[(keys.indexOf(fontSizeKey)+1)%3];
    setFontSizeKey(next);
    _fontScale = FONT_SCALES[next];
    s = buildStyles();
  };

  // 방향키 날짜 이동: ←→ 하루, Shift+←→ 기간잡기, ↑↓ 1개월
  useEffect(() => {
    const handler = (e) => {
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
      // 숫자키 1-5는 섹션2 버튼 단축키이므로 여기서는 무시
      if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) {
        e.preventDefault();
        if(e.shiftKey && !e.ctrlKey && !e.metaKey) {
          // Shift+Arrow: 기간 잡기
          if(!rangeMode) { setRangeMode(true); setEndDate(date); }
          if(e.key==="ArrowLeft") {
            setDate(d => { const nd=shiftDate(d,-1); return nd; });
          } else if(e.key==="ArrowRight") {
            setEndDate(d => { const nd=shiftDate(d,1); return nd<=yesterday?nd:d; });
          } else if(e.key==="ArrowUp") {
            setDate(d => shiftDate(d,-30));
          } else if(e.key==="ArrowDown") {
            setEndDate(d => { const nd=shiftDate(d,30); return nd<=yesterday?nd:yesterday; });
          }
        } else if(!e.shiftKey) {
          // Arrow only: 하루/한달 이동
          if(e.key==="ArrowLeft") {
            handleDateChange(shiftDate(date,-1));
          } else if(e.key==="ArrowRight") {
            const nd=shiftDate(date,1);
            if(nd<=yesterday) handleDateChange(nd);
          } else if(e.key==="ArrowUp") {
            handleDateChange(shiftDate(date,-30));
          } else if(e.key==="ArrowDown") {
            const nd=shiftDate(date,30);
            handleDateChange(nd<=yesterday?nd:yesterday);
          }
        }
      }
    };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  }, [date, endDate, rangeMode]);

  return <div style={{...s.app,display:"flex",flexDirection:"column"}}>
    <div style={s.header}>
      <div style={s.logo}>⬡ COUPANG WING / 운영 대시보드</div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1,marginLeft:"24px"}}>
        <DateSlider date={date} endDate={endDate} rangeMode={rangeMode}
          onDateChange={handleDateChange} onEndDateChange={setEndDate}
          onRangeModeToggle={()=>{setRangeMode(p=>!p); if(!rangeMode) setEndDate(date);}} />
        <button onClick={cycleFontSize}
          style={{background:C.surfaceHigh,border:"1px solid "+C.border,color:C.text,
            borderRadius:"4px",padding:"3px 10px",fontSize:fs(10),cursor:"pointer",
            fontFamily:"'DM Mono',monospace",fontWeight:700,whiteSpace:"nowrap"}}>
          {fontSizeKey}
        </button>
        <button onClick={()=>{const next=theme==="dark"?"light":"dark"; setTheme(next); applyTheme(next);}}
          style={{background:C.surfaceHigh,border:"1px solid "+C.border,color:C.text,
            borderRadius:"4px",padding:"3px 10px",fontSize:fs(10),cursor:"pointer",
            fontFamily:"'DM Mono',monospace",fontWeight:700,whiteSpace:"nowrap"}}>
          {theme==="dark"?"☀":"☾"}
        </button>
      </div>
    </div>
    <div style={{display:"flex",flex:1}}>
      <div style={{...s.main,flex:1,minWidth:0}}>
        <div style={s.sec}>
          <SecTitle n="01">{activeTab==="realtime"?"실시간 총집계":rangeMode?`기간 총집계 — ${date} ~ ${endDate}`:`일일 총집계 — ${date}`}</SecTitle>
          <KPISection date={date} endDate={effectiveEndDate} rangeMode={rangeMode} activeTab={activeTab} onTabChange={setActiveTab} sec2Totals={sec2Totals} acctFilter={acctFilter} onAcctChange={setAcctFilter} onLoad={data=>setDashboardCtx(p=>({...p,kpi:data}))}/>
        </div>
        <div style={s.sec}>
          <SecTitle n="02">{activeTab==="realtime"?"실시간 판매 상품":rangeMode?`판매 상품 — ${date} ~ ${endDate}`:`판매 상품 (클릭하여 옵션 펼치기)`}</SecTitle>
          <YesterdaySales date={date} endDate={effectiveEndDate} rangeMode={rangeMode} activeTab={activeTab} acctFilter={acctFilter} onAcctChange={setAcctFilter} onLoad={(data,totals)=>{setDashboardCtx(p=>({...p,topProducts:data})); if(totals) setSec2Totals(totals);}}/>
        </div>
      </div>
      <ChatPanel context={{...dashboardCtx,yesterday:date}} yesterday={date}/>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
